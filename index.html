const { useState, useEffect, useRef } = React;
const { HashRouter, Routes, Route, NavLink, useNavigate, useLocation, Navigate } = ReactRouterDOM;

// Set global Chart.js defaults
Chart.defaults.color = '#8a8a9d';
Chart.defaults.font.family = "'Inter', sans-serif";
Chart.defaults.scale.grid.color = 'rgba(255, 255, 255, 0.05)';

// --- UTILITY COMPONENTS ---

function CustomToggle({ defaultActive = false }) {
    const [active, setActive] = useState(defaultActive);
    return (
        <div className={`custom-toggle ${active ? 'active' : ''}`} onClick={() => setActive(!active)}></div>
    );
}

function ChartWrapper({ type, data, options }) {
    const canvasRef = useRef(null);
    const chartRef = useRef(null);

    useEffect(() => {
        if (canvasRef.current) {
            chartRef.current = new Chart(canvasRef.current, { type, data, options });
        }
        return () => {
            if (chartRef.current) {
                chartRef.current.destroy();
            }
        };
    }, [type, data, options]);

    return <canvas ref={canvasRef}></canvas>;
}
const DB = {
    getUsers: () => {
        return JSON.parse(localStorage.getItem("users")) || [];
    },

    saveUsers: (users) => {
        localStorage.setItem("users", JSON.stringify(users));
    },

    addUser: (user) => {
        const users = DB.getUsers();
        users.push(user);
        DB.saveUsers(users);
    },

    findUser: (email, password) => {
        const users = DB.getUsers();
        return users.find(
            (u) => u.email === email && u.password === password
        );
    }
};
function calculateRisk(data) {
    let risk = 0;

    if (data.rain) risk += 20;
    if (data.night) risk += 15;

    if (data.vehicle === "Bike") risk += 15;
    if (data.vehicle === "Cycle") risk += 10;

    if (data.hours > 10) risk += 20;
    if (data.income < 500) risk += 10;

    return Math.min(risk, 100);
}

function Register() {
    const navigate = useNavigate();

    const [formData, setFormData] = useState({
        name: "",
        email: "",
        password: "",

        workType: "Delivery",
        city: "",

        hours: "",

        rain: false,
        night: false
    });

        const { name, value, type, checked } = e.target;

    const handleSubmit = (e) => {
    e.preventDefault();
    const existing = DB.getUsers().find(u => u.email === formData.email);

if (existing) {

}

            date: new Date().toLocaleString(),
            risk: riskScore
        }

};

localStorage.setItem("riskshield_logged_in", "true");

navigate("/dashboard");
};

<div className="glass-card mt-2">

                <h3 style={{ fontSize: '1rem', fontWeight: 600, color: 'var(--text-light)', marginBottom: '1rem' }}>App Preferences</h3>
                <div className="flex-between" style={{ background: 'rgba(0,0,0,0.3)', padding: '0.75rem', borderRadius: 'var(--border-radius-sm)', marginBottom: '1rem' }}>
                  <h4 className="text-white text-sm">Share real-time telemetry</h4>
                  <CustomToggle defaultActive={true} />
                </div>
                <div className="flex-between" style={{ background: 'rgba(0,0,0,0.3)', padding: '0.75rem', borderRadius: 'var(--border-radius-sm)' }}>
                  <h4 className="text-white text-sm">Auto-claim triggers</h4>
                  <CustomToggle defaultActive={true} />
                </div>
            </div>
        </div>
    );
}

// --- MAIN APP (SHELL) ---

function App() {
    const [sidebarOpen, setSidebarOpen] = useState(false);
    const location = useLocation();
    const navigate = useNavigate();

    const isAuthenticated =
    localStorage.getItem("riskshield_logged_in") === "true";

const isAuthPage =
    location.pathname === "/login" ||
    location.pathname === "/register";

    const handleLogout = () => {
    localStorage.removeItem("riskshield_logged_in");
    localStorage.removeItem("currentUser");
    navigate("/login");
};

    const getPageTitle = () => {
        switch (location.pathname) {
            case '/dashboard': return 'Overview';
            case '/plans': return 'Plan Selection';
            case '/live': return 'Live Monitoring';
            case '/wallet': return 'Wallet & Payouts';
            case '/insights': return 'Risk Insights';
            case '/profile': return 'Profile Settings';
            default: return 'Overview';
        }
    };
const user = JSON.parse(localStorage.getItem("currentUser")) || {};

if (!isAuthenticated) {
    return (
        <Routes>
            <Route path="/login" element={<Login />} />
            <Route path="/register" element={<Register />} />
            <Route path="*" element={<Navigate to="/login" replace />} />
        </Routes>
    );
}

// If logged in and tries to access login/register → redirect
if (isAuthenticated && isAuthPage) {
    return <Navigate to="/dashboard" replace />;
}
    return (
        <div className="app-container">
            <aside className={`sidebar glass-panel ${sidebarOpen ? 'open' : ''}`}>
                <div className="logo" style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', padding: '0 1.5rem', marginBottom: '2.5rem', fontWeight: 700, fontSize: '1.25rem' }}>
                    <i className="fa-solid fa-shield-halved text-neon-blue drop-glow-blue" style={{ fontSize: '1.5rem' }}></i>
                    <span>RiskShield <span className="text-neon-purple drop-glow-purple">AI</span></span>
                </div>
                
                <nav className="nav-menu" style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem', padding: '0 1rem', flexGrow: 1 }}>
                    <NavLink to="/dashboard" onClick={() => setSidebarOpen(false)} className={({isActive}) => 'nav-item ' + (isActive ? 'active' : '')}>
                        <i className="fa-solid fa-chart-pie" style={{ width: '20px', textAlign: 'center' }}></i> <span>Dashboard</span>
                    </NavLink>
                    <NavLink to="/plans" onClick={() => setSidebarOpen(false)} className={({isActive}) => 'nav-item ' + (isActive ? 'active' : '')}>
                        <i className="fa-solid fa-layer-group" style={{ width: '20px', textAlign: 'center' }}></i> <span>Plans</span>
                    </NavLink>
                    <NavLink to="/live" onClick={() => setSidebarOpen(false)} className={({isActive}) => 'nav-item ' + (isActive ? 'active' : '')}>
                        <i className="fa-solid fa-satellite-dish" style={{ width: '20px', textAlign: 'center' }}></i> <span>Live Monitor</span>
                    </NavLink>
                    <NavLink to="/wallet" onClick={() => setSidebarOpen(false)} className={({isActive}) => 'nav-item ' + (isActive ? 'active' : '')}>
                        <i className="fa-solid fa-wallet" style={{ width: '20px', textAlign: 'center' }}></i> <span>Wallet</span>
                    </NavLink>
                    <NavLink to="/insights" onClick={() => setSidebarOpen(false)} className={({isActive}) => 'nav-item ' + (isActive ? 'active' : '')}>
                        <i className="fa-solid fa-brain" style={{ width: '20px', textAlign: 'center' }}></i> <span>Insights</span>
                    </NavLink>
                    <NavLink to="/profile" onClick={() => setSidebarOpen(false)} className={({isActive}) => 'nav-item ' + (isActive ? 'active' : '')}>
                        <i className="fa-solid fa-user-astronaut" style={{ width: '20px', textAlign: 'center' }}></i> <span>Profile</span>
                    </NavLink>
                    <button onClick={handleLogout} className="nav-item" style={{ marginTop: 'auto', paddingTop: '1rem', borderTop: '1px solid var(--text-gray-dark)', color: 'var(--neon-pink)', background: 'transparent', textAlign: 'left', width: '100%' }}>
                        <i className="fa-solid fa-arrow-right-from-bracket" style={{ width: '20px', textAlign: 'center' }}></i> <span>Logout</span>
                    </button>
                </nav>
            </aside>

            <main className="main-content">
                <header className="topbar glass-panel">
                    <div className="mobile-menu-toggle" onClick={() => setSidebarOpen(!sidebarOpen)} style={{ cursor: 'pointer', fontSize: '1.25rem' }}>
                        <i className="fa-solid fa-bars"></i>
                    </div>
                    <div className="header-title">
                        <h2 style={{ fontWeight: 600, fontSize: '1.5rem' }}>{getPageTitle()}</h2>
                    </div>
                    <div className="topbar-actions" style={{ display: 'flex', alignItems: 'center', gap: '1.5rem' }}>
                        <div className="user-profile" style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', cursor: 'pointer' }}>
                            <img src="https://i.pravatar.cc/150?img=11" alt="User Avatar" style={{ width: '44px', height: '44px', borderRadius: '50%', border: '2px solid var(--neon-purple)' }} />
                            <div className="user-info" style={{ display: 'flex', flexDirection: 'column' }}>
                                <span className="name">{user?.name || "User"}</span>
                                <span className="rank text-neon-blue" style={{ fontSize: '0.75rem', fontWeight: 500 }}>Diamond Tier</span>
                            </div>
                        </div>
                    </div>
                </header>

                <div className="pages-container">
                    <Routes>
                        <Route path="/dashboard" element={<Dashboard />} />
                        <Route path="/plans" element={<Plans />} />
                        <Route path="/live" element={<LiveMonitoring />} />
                        <Route path="/wallet" element={<Wallet />} />
                        <Route path="/insights" element={<RiskInsights />} />
                        <Route path="/profile" element={<Profile />} />
                        <Route path="*" element={<Navigate to="/dashboard" replace />} />
                    </Routes>
                </div>
            </main>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
    <HashRouter>
        <App />
    </HashRouter>
);

</script>
</body>
</html>
)
